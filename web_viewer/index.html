<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Genesis – Live Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      display: flex; gap: 8px; padding: 8px 12px; background: #222; align-items: center; flex-wrap: wrap;
    }
    #toolbar button { padding: 4px 10px; cursor: pointer; }
    #toolbar label { font-size: 13px; }
    #toolbar input[type=range] { width: 100px; }
    #info { font-size: 12px; color: #aaa; margin-left: auto; }
    #viewport { flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #chart-container {
      position: absolute; bottom: 10px; right: 10px; width: 320px; height: 160px;
      background: rgba(0,0,0,0.7); border: 1px solid #444; border-radius: 4px; padding: 4px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-play">▶ Play</button>
    <label>Speed <input id="speed-slider" type="range" min="1" max="60" value="10" /></label>
    <span id="info">Connecting…</span>
  </div>
  <div id="viewport">
    <canvas id="render-canvas"></canvas>
    <div id="chart-container">
      <canvas id="s-chart"></canvas>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Chart.js for S-functional graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <script src="client.js"></script>
</body>
</html>
